name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        timeout-minutes: 15

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: wb-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: wb-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: wb-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: wb-macos-aarch64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        timeout-minutes: 10
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        timeout-minutes: 25

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/wb ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        timeout-minutes: 10
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Collect all binaries
          FILES=""
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                # Move to flat directory
                BASENAME=$(basename "$file")
                mv "$file" "./$BASENAME"
                chmod +x "./$BASENAME"
                FILES="$FILES ./$BASENAME"
              fi
            done
          done

          # Create GitHub release with assets
          gh release create "$TAG" \
            --title "wb $VERSION" \
            --generate-notes \
            $FILES
